<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentCollab</title>
    <style>
      html, body, #app { width: 100%; height: 100%; margin: 0; }
      .app-boot {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(84, 102, 255, .10), transparent 34%),
          #f8f9fc;
        color: #1d2233;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }
      .app-boot__content { display: flex; flex-direction: column; align-items: center; }
      .app-boot__mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        color: #fff;
        background: linear-gradient(135deg, #6575ff, #6850db);
        box-shadow: 0 14px 34px rgba(84, 102, 255, .24);
        animation: boot-pulse 1.8s ease-in-out infinite;
      }
      .app-boot__title { margin-top: 18px; font-size: 17px; font-weight: 700; letter-spacing: -.2px; }
      .app-boot__status { margin-top: 7px; color: #747b8f; font-size: 12px; }
      .app-boot__track {
        width: 156px;
        height: 3px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 99px;
        background: rgba(84, 102, 255, .12);
      }
      .app-boot__bar {
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6575ff, #8b6cff);
        animation: boot-loading 1.15s ease-in-out infinite;
      }
      @keyframes boot-loading {
        from { transform: translateX(-110%); }
        to { transform: translateX(330%); }
      }
      @keyframes boot-pulse {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @media (prefers-color-scheme: dark) {
        .app-boot {
          color: #eef0f8;
          background:
            radial-gradient(circle at 50% 42%, rgba(102, 117, 255, .15), transparent 34%),
            #17181d;
        }
        .app-boot__status { color: #8e94a7; }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot__mark, .app-boot__bar { animation-duration: 3s; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-boot" role="status" aria-live="polite" aria-label="正在加载 AgentCollab">
        <div class="app-boot__content">
          <div class="app-boot__mark" aria-hidden="true">
            <svg width="29" height="29" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="7" width="18" height="13" rx="3" fill="currentColor"/>
              <circle cx="8.5" cy="13" r="1.4" fill="#6575ff"/>
              <circle cx="15.5" cy="13" r="1.4" fill="#6575ff"/>
              <path d="M9 16.5h6" stroke="#6575ff" stroke-width="1.5" stroke-linecap="round"/>
              <rect x="9" y="3" width="6" height="4" rx="1.5" fill="currentColor"/>
            </svg>
          </div>
          <div class="app-boot__title">AgentCollab</div>
          <div class="app-boot__status">正在一次性加载工作台资源…</div>
          <div class="app-boot__track" aria-hidden="true">
            <div class="app-boot__bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
